<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-5 desc-0-5">
<title id="title-0-5">Side-by-side comparison of the original Tropicana Pure Premium carton...</title>
<desc id="desc-0-5">Side-by-side comparison of the original Tropicana Pure Premium carton (orange with straw) and the 2009 redesign (glass of juice). Caption should direct students to identify the specific archetype signals in each design: What does each version signal about simplicity, aspiration, and recognition?</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Side-by-side comparison of the original Tropicana Pure Premium carton...</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">Side-by-side comparison of the original Tropicana Pure Premium</tspan><tspan x="48" dy="15">carton (orange with straw) and the 2009 redesign (glass of juice).</tspan><tspan x="48" dy="15">Caption should direct students to identify the specific archetype</tspan><tspan x="48" dy="15">signals in each design: What does each version signal about</tspan></text>
