<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-7 desc-0-7">
<title id="title-0-7">visual of the n8n workflow after the AI layer is added</title>
<desc id="desc-0-7">A visual of the n8n workflow after the AI layer is added — showing the Chapter 5 pipeline with an AI step inserted, a validation node immediately after the AI step, a schema-check node, and two routing paths: one for valid output (proceeds to next step) and one for invalid output (error handler / human review queue). Student should see that the AI step is wrapped, not floating in isolation.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">visual of the n8n workflow after the AI layer is added</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">A visual of the n8n workflow after the AI layer is added — showing</tspan><tspan x="48" dy="15">the Chapter 5 pipeline with an AI step inserted, a validation node</tspan><tspan x="48" dy="15">immediately after the AI step, a schema-check node, and two</tspan><tspan x="48" dy="15">routing paths: one for valid output (proceeds to next step) and</tspan></text>
