<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-2 desc-0-2">
<title id="title-0-2">visual map of all twelve archetypes arranged by their primary motivations</title>
<desc id="desc-0-2">A visual map of all twelve archetypes arranged by their primary motivations — perhaps arranged around two axes (Order/Freedom and Ego/Soul, as Mark and Pearson suggest) so students see the system's internal logic rather than a flat list. Students should see which archetypes cluster near each other and why.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">visual map of all twelve archetypes arranged by their primary motivations</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">A visual map of all twelve archetypes arranged by their primary</tspan><tspan x="48" dy="15">motivations — perhaps arranged around two axes (Order/Freedom and</tspan><tspan x="48" dy="15">Ego/Soul, as Mark and Pearson suggest) so students see the</tspan><tspan x="48" dy="15">system's internal logic rather than a flat list. Students should</tspan></text>
