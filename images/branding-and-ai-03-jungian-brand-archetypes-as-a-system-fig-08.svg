<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-8 desc-0-8">
<title id="title-0-8">comparison table across all three cases</title>
<desc id="desc-0-8">A comparison table across all three cases — columns: Brand, Original Archetype, Drift Direction, Customer Rejection Mechanism, Time to Rollback, Shadow or Category Error. Students should be able to complete this table from the chapter text as a self-check.</desc>
