<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-3 desc-0-3">
<title id="title-0-3">Side-by-side comparison of the two architectures as user experience flows</title>
<desc id="desc-0-3">Side-by-side comparison of the two architectures as user experience flows — Architecture A: user → visible agent reasoning trace → report; failure mode shown as user watching the trace loop. Architecture B: user → brief form → status indicator → report; failure mode shown as error message with no context. Student should see that the architecture determines not just *when* failure happens but *how* it is experienced.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Side-by-side comparison of the two architectures as user experience flows</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">Side-by-side comparison of the two architectures as user</tspan><tspan x="48" dy="15">experience flows — Architecture A: user → visible agent reasoning</tspan><tspan x="48" dy="15">trace → report; failure mode shown as user watching the trace</tspan><tspan x="48" dy="15">loop. Architecture B: user → brief form → status indicator →</tspan></text>
<defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker></defs>
<rect x="48" y="170" width="96" height="64" fill="#C8102E" stroke="#D4D4D4" stroke-width="1"/>
<text x="96" y="202" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#FFFFFF">side</text>
<path d="M 148 202 L 168 202" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="172" y="170" width="96" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="220" y="202" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">comparison</text>
<path d="M 272 202 L 292 202" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<rect x="296" y="170" width="96" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
<text x="344" y="202" text-anchor="middle" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="11" fill="#2a1a0e">architectures</text>
<path d="M 396 202 L 416 202" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
