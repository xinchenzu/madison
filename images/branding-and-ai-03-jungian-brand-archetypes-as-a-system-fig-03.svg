<desc id="desc-0-3">A decision tree showing one brand decision (e.g., "What tone should our error messages use?") resolved differently for five different archetypes — Sage, Hero, Jester, Caregiver, Outlaw. Students should see that the archetype is doing the deciding work, not aesthetic preference.</desc>
