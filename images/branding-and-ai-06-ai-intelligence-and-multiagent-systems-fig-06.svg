<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">Three versions of the same agent output</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">Three versions of the same agent output — Pattern 1 (abstain): a</tspan><tspan x="48" dy="15">paragraph that says "I cannot verify X"; Pattern 2 (null fields):</tspan><tspan x="48" dy="15">a JSON object with some fields populated and others set to null</tspan><tspan x="48" dy="15">with notes; Pattern 3 (confidence labels): a JSON object with each</tspan></text>
