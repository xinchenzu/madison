<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-6 desc-0-6">
<title id="title-0-6">Three versions of the same agent output</title>
<desc id="desc-0-6">Three versions of the same agent output — Pattern 1 (abstain): a paragraph that says "I cannot verify X"; Pattern 2 (null fields): a JSON object with some fields populated and others set to null with notes; Pattern 3 (confidence labels): a JSON object with each field annotated with a confidence level. Student should see how the same underlying uncertainty is expressed differently in each pattern and what the downstream system can do with each.</desc>
