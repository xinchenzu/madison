<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-4 desc-0-4">
<title id="title-0-4">before/after comparison of the same case study written two ways</title>
<desc id="desc-0-4">A before/after comparison of the same case study written two ways — left: brand-as-hero with abstract stakes ("We built a tool that helped marketing teams be more efficient"); right: customer-as-hero with specific stakes (the specific time saving, the specific redeployment of effort, the specific outcome). Student should see the structural difference in character positions and the credibility difference in stakes specification.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">before/after comparison of the same case study written two ways</text>
