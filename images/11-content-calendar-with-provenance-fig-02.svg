<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
<title id="fig-title-02">The Provenance Row Anatomy</title>
<desc>Two stacked, column-aligned bands of ten calendar cells. The top band is fully populated and ends in an approved status. The bottom band is a problem row where message pillar, source, asset, owner, CTA and approval are blank and hatched, marking each empty field as an unmade decision.</desc>
<metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="The Madison CLI Framework" book-slug="madison" chapter="11-content-calendar-with-provenance" figure-number="02" figure-title="The Provenance Row Anatomy" figure-slug="the-provenance-row-anatomy" figure-type="structural schematic" priority="Critical" author="Humanitarians AI Incorporated" date-generated="2026-06-15" source-file="pantry/11-content-calendar-with-provenance-cajal.md"/></metadata>
