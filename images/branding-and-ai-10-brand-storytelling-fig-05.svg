<title id="title-0-5">matrix of story shapes × channels</title>
<desc id="desc-0-5">A matrix of story shapes × channels — rows: origin story, case study, quest story, thought-leadership, transformation story; columns: LinkedIn article, blog post, newsletter, README, portfolio card. Each cell: "Strong fit," "Possible," or "Weak fit." Student should be able to locate their story shape and identify which channels to prioritize.</desc>
