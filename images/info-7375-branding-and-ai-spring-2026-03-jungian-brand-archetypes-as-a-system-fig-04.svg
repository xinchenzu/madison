<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-4 desc-0-4">
<title id="title-0-4">table listing all twelve archetypes, their core strength, and their shadow</title>
<desc id="desc-0-4">A table listing all twelve archetypes, their core strength, and their shadow — formatted so students can see the structural relationship between the strength and its failure mode. Not just "here is the shadow" but "here is why this shadow is the natural breakdown of this strength."</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">table listing all twelve archetypes, their core strength, and their shadow</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">A table listing all twelve archetypes, their core strength, and</tspan><tspan x="48" dy="15">their shadow — formatted so students can see the structural</tspan><tspan x="48" dy="15">relationship between the strength and its failure mode. Not just</tspan><tspan x="48" dy="15">"here is the shadow" but "here is why this shadow is the natural</tspan></text>
