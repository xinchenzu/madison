<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title-0-1 desc-0-1">
<title id="title-0-1">side-by-side comparison of the brand-as-hero framing vs</title>
<desc id="desc-0-1">A side-by-side comparison of the brand-as-hero framing vs. the customer-as-hero framing — same product, two story shapes. Left: brand is protagonist, customer is beneficiary at the end. Right: customer is protagonist with a problem, brand enters as guide with a plan, customer is transformed. Student should see the structural difference in character roles, not just the tone difference.</desc>
<rect width="700" height="420" fill="#FFFFFF"/>
<text x="48" y="54" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#2a1a0e">side-by-side comparison of the brand-as-hero framing vs</text>
<text x="48" y="78" font-family="'EB Garamond', Georgia, 'Times New Roman', serif" font-size="10" fill="#545454"><tspan x="48" dy="0">A side-by-side comparison of the brand-as-hero framing vs. the</tspan><tspan x="48" dy="15">customer-as-hero framing — same product, two story shapes. Left:</tspan><tspan x="48" dy="15">brand is protagonist, customer is beneficiary at the end. Right:</tspan><tspan x="48" dy="15">customer is protagonist with a problem, brand enters as guide with</tspan></text>
