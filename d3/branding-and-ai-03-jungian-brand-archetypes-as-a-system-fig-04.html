<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>table listing all twelve archetypes, their core strength, and their shadow</title><style>:root { --color-white:#FFFFFF; --color-fill:#F5EFE8; --color-ink:#2a1a0e; --color-mark:#6B3520; --color-red:#C8102E; --color-slate:#1A3A5C; --color-ochre:#C8860E; --color-secondary:#545454; --color-border:#D4D4D4; } @media (prefers-color-scheme: dark) { :root { --color-white:#111111; --color-fill:#1B1713; --color-ink:#F0EBE3; --color-mark:#B4785A; --color-red:#E8243A; --color-slate:#86A7CA; --color-ochre:#D49A30; --color-secondary:#A0978C; --color-border:#2E2E2E; } } *{box-sizing:border-box;} body{margin:0;background:var(--color-white);color:var(--color-ink);font-family:'EB Garamond', Georgia, serif;} #chart{min-height:100vh;padding:24px;} .tooltip{position:absolute;pointer-events:none;opacity:0;background:var(--color-slate);color:var(--color-white);border:1px solid var(--color-border);padding:8px 10px;font-family:'EB Garamond', Georgia, serif;font-size:13px;max-width:240px;} .title{font-family:'EB Garamond', Georgia, serif;font-size:17px;font-weight:700;fill:var(--color-ink);} .subtitle,.axis-label{font-family:'EB Garamond', Georgia, serif;font-size:11px;fill:var(--color-secondary);} .value-label{font-family:'IBM Plex Mono','JetBrains Mono',monospace;font-size:10px;fill:var(--color-secondary);letter-spacing:0.08em;} @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}</style></head><body><div id="chart" role="main"></div><script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script><script>const barData=[{"label":"listing","value":88},{"label":"all","value":74},{"label":"twelve","value":61},{"label":"archetypes","value":47},{"label":"their","value":34}];const titleText="table listing all twelve archetypes, their core strength, and their shadow";const descText="A table listing all twelve archetypes, their core strength, and their shadow — formatted so students can see the structural relationship between the strength and its failure mode. Not just \"here is the shadow\" but \"here is why this shadow is the natural breakdown of this strength.\"";const tooltip=d3.select('body').append('div').attr('class','tooltip');function showTooltip(event,d){tooltip.html('<strong>'+d.label+'</strong><br>Relative emphasis: '+d.value).style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px').transition().duration(150).style('opacity',1);}function moveTooltip(event){tooltip.style('left',(event.pageX+12)+'px').style('top',(event.pageY-28)+'px');}function hideTooltip(){tooltip.transition().duration(100).style('opacity',0);}function draw(){d3.select('#chart').selectAll('*').remove();const container=document.getElementById('chart');const totalWidth=Math.max(container.clientWidth-48,700);const totalHeight=520;const margin={top:72,right:48,bottom:72,left:150};const chartWidth=totalWidth-margin.left-margin.right;const chartHeight=totalHeight-margin.top-margin.bottom;const svg=d3.select('#chart').append('svg').attr('width',totalWidth).attr('height',totalHeight).attr('role','img').attr('aria-labelledby','chart-title chart-desc');svg.append('title').attr('id','chart-title').text(titleText);svg.append('desc').attr('id','chart-desc').text(descText);svg.append('text').attr('class','title').attr('x',24).attr('y',32).text(titleText);svg.append('text').attr('class','subtitle').attr('x',24).attr('y',56).text(descText.slice(0,132));const gChart=svg.append('g').attr('class','g-chart').attr('transform','translate('+margin.left+','+margin.top+')');gChart.append('rect').attr('width',chartWidth).attr('height',chartHeight).attr('fill','var(--color-fill)').attr('stroke','var(--color-border)').attr('stroke-width',0.75);const xScaleLinear=d3.scaleLinear().domain([0,100]).range([0,chartWidth]);const yScaleBand=d3.scaleBand().domain(barData.map(d=>d.label)).range([24,chartHeight-24]).padding(0.22);const xAxis=d3.axisBottom(xScaleLinear).ticks(5).tickSize(-(chartHeight-48));gChart.append('g').attr('class','g-axes').attr('transform','translate(0,'+(chartHeight-24)+')').call(xAxis).call(g=>g.selectAll('.domain').remove()).call(g=>g.selectAll('line').attr('stroke','var(--color-border)').attr('stroke-dasharray','2 4')).call(g=>g.selectAll('text').attr('class','axis-label'));const bars=gChart.selectAll('.bar-rect').data(barData,d=>d.label).join('rect').attr('class','bar-rect').attr('x',0).attr('y',d=>yScaleBand(d.label)).attr('height',yScaleBand.bandwidth()).attr('width',d=>xScaleLinear(d.value)).attr('fill',(d,i)=>i===0?'var(--color-red)':i===1?'var(--color-slate)':'var(--color-mark)').attr('opacity',1);bars.on('mouseover',function(event,d){d3.select(this).attr('opacity',0.78);showTooltip(event,d);}).on('mousemove',moveTooltip).on('mouseout',function(event,d){d3.select(this).attr('opacity',1);hideTooltip();});gChart.selectAll('.category-label').data(barData).join('text').attr('class','axis-label').attr('x',-12).attr('y',d=>yScaleBand(d.label)+yScaleBand.bandwidth()/2+4).attr('text-anchor','end').text(d=>d.label);gChart.selectAll('.value-label').data(barData).join('text').attr('class','value-label').attr('x',d=>xScaleLinear(d.value)+8).attr('y',d=>yScaleBand(d.label)+yScaleBand.bandwidth()/2+4).text(d=>d.value);}draw();const ro=new ResizeObserver(()=>draw());ro.observe(document.getElementById('chart'));</script></body></html>
