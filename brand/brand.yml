# brand.yml — INFO 7375 Exercise 1, personal brand layer (Xinchen Zu)
# Constraint: every fact about the person is from the resume PDF only.
# Rule of this file: an attribute may live here ONLY if a resume.json entry
# backs it. No proof -> aspiration -> gaps.md.

aspiration: >-
  I am becoming a marketing technologist who bridges brand strategy, data, and
  AI to create measurable business impact.
# Proof status (resume-based): brand strategy + data are backed by resume.json.
# AI is NOT backed by any resume entry -> top gap in gaps.md, not an attribute.

audience:
  # NOTE: audience is a brand DECISION derived from your aspiration — it is not a
  # fact stated on your resume. Marked accordingly; confirm against real postings.
  - who: "Hiring managers & recruiters for marketing-technology / marketing-analytics roles"
    basis: "derived from your aspiration (NOT a resume fact)"
    they_care_about: "evidence you connect brand strategy to measurable outcomes with data"
  - who: "Consumer-brand & e-commerce growth teams"
    basis: "derived from your aspiration + your demonstrated domain (resume: Dealmoon/TikTok/NetEase)"
    they_care_about: "data-informed campaign operators who also understand brand"

positioning:
  # April Dunford, *Obviously Awesome* — positioning as context-setting.
  frame: >-
    The marketing technologist who pairs brand-strategy training with hands-on
    campaign data work — and is building the AI layer on top of that proof.

  anti_position: >-
    NOT a storyteller-marketer with no numbers, and NOT a pure analyst with no
    brand sense. Self-test: if I claim "AI," I must point to something I built
    that uses it. Until that artifact exists (see gaps.md), AI is a direction I
    am building toward, not a claim I make.

  competitive_alternatives:
    # Generic categories, not named outside entities.
    - "Pure data analysts — strong on analysis, lighter on brand/campaign judgment"
    - "Pure marketers/creatives — strong on brand, lighter on data and Python"
    - "Marketing-ops generalists — process, but less data depth or brand strategy"

  unique_attributes:
    # Each attribute MUST point to a resume.json entry. All proof below is on the resume.
    - attribute: "Runs large-scale, cross-functional marketing campaigns end to end"
      proof:
        - "experience: Dealmoon — Campaign Specialist (Black Friday, 9/16 Shopping Day; led product/design/tech teams)"
      vs: "Owned delivery across functions and timelines."

    - attribute: "Turns post-campaign and user data into decision-ready insights"
      proof:
        - "experience: Dealmoon — post-campaign GMV & feedback analysis -> playbooks"
        - "experience: NetEase — competitive analysis of 5+ players; dashboard diagnostics"
        - "skills: Python (data analysis); Microsoft Excel"
      vs: "The 'data' pillar of the aspiration, already evidenced."

    - attribute: "Brand strategy grounded in formal training + brand partnerships"
      proof:
        - "education: B.A. Strategic Communication, Washington State University"
        - "experience: Dealmoon — co-developed strategies with Estee Lauder, YamiBuy"
      vs: "The 'brand strategy' pillar, evidenced by degree + named brands on the resume."

    - attribute: "Builds operational systems that scale (SOPs, acquisition models)"
      proof:
        - "experience: TikTok — designed host-acquisition SOP (segmentation, incentives, collaboration model)"
        - "experience: TikTok — streamlined creator-merchant-ops coordination"
      vs: "Designs repeatable process, not one-off execution."

    - attribute: "Cross-border / China-US e-commerce & creator/livestream operations"
      proof:
        - "experience: TikTok — UK market-entry strategy; matched 80+ advertisers to creators"
        - "experience: Dealmoon — strategies with global brands"
        - "skills: Mandarin (native) + English (business proficiency)"
      vs: "Operates natively across the China-US consumer-commerce gap."

  one_line:
    recommended: >-
      For consumer brands that need marketing decisions backed by evidence,
      Xinchen Zu is the marketing technologist who pairs brand-strategy training
      with hands-on campaign analytics — and is building the AI layer on the data
      she already works in.
    note: "AI is stated as a direction ('building toward'), never a present capability — no resume entry backs it."

media:
  # Step 3: targets DERIVED from the aspiration via cited research (path #2).
  # Full research record + numbered sources: brand/media-research.md and
  # brand/media-target-map.md. Each kept channel carries a cited reason.
  - channel: "Online portfolio (case studies)"
    role: "proof"
    cited_reason: >-
      Employers are skeptical of skill lists and want proof of execution shown as
      outcomes, not outputs; portfolios/case studies carry as much weight as
      qualifications. [LSE Exec Ed; JobPrepped; vocal.media; KSU]
    win_condition: "2-3 case studies, each framed problem -> approach -> outcome -> recommendation"
  - channel: "GitHub (+ Kaggle for notebooks)"
    role: "proof"
    cited_reason: >-
      A portfolio is among the most important factors in data hiring; GitHub/Kaggle
      is the standard place to host code and notebooks — where the data + AI pillars
      get evidenced. [Coursera; Towards Data Science; 365 Data Science]
    win_condition: "well-presented repo using a real, messy dataset with documented cleaning + a business recommendation; no tutorial staples (Titanic/Iris)"
  - channel: "MarTech.org community + MarTech Conference (+ MarketingProfs)"
    role: "discovery + voice"
    cited_reason: >-
      The named ecosystem for marketing technologists specifically (the exact hybrid
      role), not a generic marketing crowd. [MarTech.org; MarTech Conference; MarketingProfs]
    win_condition: "active participation, then a contribution or session that puts my work in front of the field"
  - channel: "LinkedIn"
    role: "discovery"
    cited_reason: >-
      Included on evidence, not habit: 93% of recruiters source candidates on LinkedIn
      and search by skills/keywords, making it the highest-probability discovery surface.
      [LinkedIn / S. Bruce; Salesso]
    win_condition: "profile surfaces in recruiter keyword searches for my target terms; inbound contact; clickthrough to portfolio/GitHub"
  - channel: "Certifications — Google Analytics 4, HubSpot"
    role: "proof (supporting)"
    cited_reason: >-
      Costly-to-fake tool-proficiency signals: GA appears in 41% of marketing-analyst
      postings; HubSpot demand is high. Supporting, not a headline. [Jobsolv; iidtescala; Modern Marketing Institute]
    win_condition: "GA4 certified; credential paired with a portfolio project that uses the tool (a cert alone is rarely enough)"
  - channel: "Data-driven storytelling content"
    role: "voice"
    cited_reason: >-
      Credibility for this role is built through data-driven storytelling, not posting
      volume — it demonstrates the analytical thinking at the core of the aspiration. [LSE Exec Ed]
    win_condition: "occasional write-ups that each turn one analysis into a clear, decision-oriented story"

# --- media CUT / deprioritized (rubric line 7 — rejections keep their reason) ---
media_cut:
  - "Generic social broadcasting / 'be active online' (e.g. Instagram/TikTok personal-brand posting) as a primary strategy — this field rewards proof of execution over presence. [LSE Exec Ed; JobPrepped]"
  - "Certifications as the PRIMARY/sole strategy — a cert on its own is 'rarely enough' without demonstrable skills + a portfolio; kept only as supporting proof. [iidtescala; Modern Marketing Institute]"
  - "Tutorial-staple / popular Kaggle clone projects (Titanic, Iris) on GitHub — hiring managers discount them; use real, messy datasets. [Careery]"
  - "GitHub star-chasing / repo quantity as the signal — the signal is a well-presented, evaluable project, not popularity or count. [Careery]"
